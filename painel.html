<!DOCTYPE html>
<html lang="pt-br">
<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Painel</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="min-h-screen bg-gradient-to-br from-pink-100 via-pink-200 to-purple-200 p-6">

  <div class="max-w-4xl mx-auto">

    <!-- HEADER -->
    <div class="bg-white rounded-3xl shadow-xl p-6 mb-6">

      <div class="flex flex-col md:flex-row items-center justify-between gap-5">

        <!-- PERFIL -->
        <div class="flex items-center gap-4">

          <img
            id="logo"
            src="https://placehold.co/100x100/png"
            class="w-24 h-24 rounded-full object-cover border-4 border-pink-200 shadow"
          >

          <div>

            <h1 id="studioName" class="text-3xl font-bold text-gray-800">
              Meu Studio
            </h1>

            <p class="text-gray-500 mt-1">
              Painel profissional ✨
            </p>

          </div>

        </div>

        <!-- AÇÕES -->
        <div class="grid grid-cols-2 gap-3 w-full md:w-auto">

          <button
            onclick="window.location.href='perfil.html'"
            class="bg-white border border-pink-300 text-pink-600 px-4 py-3 rounded-2xl font-bold hover:bg-pink-50 transition shadow"
          >
            Perfil
          </button>

          <button
            onclick="window.location.href='servicos.html'"
            class="bg-white border border-pink-300 text-pink-600 px-4 py-3 rounded-2xl font-bold hover:bg-pink-50 transition shadow"
          >
            Serviços
          </button>

        </div>

      </div>

    </div>

    <!-- FILTROS -->
    <div class="flex flex-wrap justify-center gap-3 mb-6">

      <button onclick="filtrar('booked')" id="btn-booked"
        class="px-5 py-3 rounded-2xl bg-white text-gray-700 shadow font-semibold transition">
        Agendados
      </button>

      <button onclick="filtrar('done')" id="btn-done"
        class="px-5 py-3 rounded-2xl bg-white text-gray-700 shadow font-semibold transition">
        Concluídos
      </button>

      <button onclick="filtrar('cancelled')" id="btn-cancelled"
        class="px-5 py-3 rounded-2xl bg-white text-gray-700 shadow font-semibold transition">
        Cancelados
      </button>

    </div>

    <!-- LISTA -->
    <div id="lista" class="space-y-4"></div>

  </div>

  <!-- JS -->
  <script src="painel.js"></script>

</body>
</html>
