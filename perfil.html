<!DOCTYPE html>
<html lang="pt-br">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Meu Studio</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="bg-gradient-to-br from-pink-100 via-pink-200 to-pink-300 min-h-screen p-4">

  <div class="max-w-md mx-auto">

    <!-- CARD PRINCIPAL -->
    <div class="bg-white rounded-3xl shadow-xl p-6">

      <!-- LOGO -->
      <img
        id="preview"
        src="https://placehold.co/120x120/png"
        class="w-28 h-28 rounded-full mx-auto object-cover border-4 border-pink-200 shadow"
      >

      <!-- NOME -->
      <h1
        id="studioTitle"
        class="text-2xl font-bold text-center mt-4 text-gray-800"
      >
        Meu Studio
      </h1>

      <!-- LINK -->
      <div
        id="publicLink"
        class="bg-pink-50 text-center p-3 rounded-2xl mt-4 text-sm"
      ></div>

      <!-- BOTÕES -->
      <div class="grid grid-cols-2 gap-3 mt-5">

        <!-- COPIAR -->
        <button
          id="copiar"
          class="
            bg-pink-500
            hover:bg-pink-600
            text-white
            p-3
            rounded-2xl
            font-bold
            transition
          "
        >
          Copiar Link
        </button>

        <!-- AGENDA -->
        <button
          id="abrirAgenda"
          class="
            bg-white
            border
            border-pink-300
            text-pink-600
            p-3
            rounded-2xl
            font-bold
            hover:bg-pink-50
            transition
          "
        >
          Agendamento Manual
        </button>

        <!-- PAINEL -->
        <button
          onclick="window.location.href='painel.html'"
          class="
            bg-white
            border
            border-pink-300
            text-pink-600
            p-3
            rounded-2xl
            font-bold
            hover:bg-pink-50
            transition
          "
        >
          Painel
        </button>

        <!-- SERVIÇOS -->
        <button
          onclick="window.location.href='servicos.html'"
          class="
            bg-white
            border
            border-pink-300
            text-pink-600
            p-3
            rounded-2xl
            font-bold
            hover:bg-pink-50
            transition
          "
        >
          Serviços
        </button>

        <!-- EDITAR -->
        <button
          id="editar"
          class="
            col-span-2
            bg-gray-100
            text-gray-700
            p-3
            rounded-2xl
            font-bold
            hover:bg-gray-200
            transition
          "
        >
          Editar Perfil
        </button>

      </div>

    </div>

    <!-- CARD EDITAR -->
    <div
      id="editCard"
      class="bg-white rounded-3xl shadow-xl p-6 mt-5 hidden"
    >

      <h2 class="text-xl font-bold mb-4">
        Editar Perfil ✨
      </h2>

      <!-- NOME -->
      <input
        id="studio"
        placeholder="Nome do Studio"
        class="w-full mb-3 p-3 border rounded-2xl"
      >

      <!-- USERNAME -->
      <input
        id="username"
        placeholder="Seu link (ex: sophia)"
        class="w-full mb-3 p-3 border rounded-2xl"
      >

      <!-- LOGO -->
      <input
        type="file"
        id="logoFile"
        class="w-full mb-4"
        accept="image/*"
      >

      <!-- SALVAR -->
      <button
        id="salvar"
        class="
          w-full
          bg-pink-500
          hover:bg-pink-600
          text-white
          p-3
          rounded-2xl
          font-bold
          transition
        "
      >
        Salvar Alterações
      </button>

      <!-- LOGOUT -->
      <button
        id="logout"
        class="
          w-full
          mt-3
          bg-gray-100
          hover:bg-gray-200
          p-3
          rounded-2xl
          transition
        "
      >
        Sair da conta
      </button>

      <!-- MSG -->
      <p
        id="msg"
        class="text-center text-sm mt-3"
      ></p>

    </div>

  </div>

<script>

document.addEventListener("DOMContentLoaded", async () => {

  // 🔗 SUPABASE
  const supabase = window.supabase.createClient(
    "https://bjaurtrqrasznuptthyf.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqYXVydHJxcmFzem51cHR0aHlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MDkwNTIsImV4cCI6MjA5MzQ4NTA1Mn0.iCQyvzAJykzgLO4kZkJZ8qNbv3549rG_JuwcVEZDrKA"
  );

  // 🔐 USER
  const {
    data: { user }
  } = await supabase.auth.getUser();

  if (!user) {

    window.location.href = "login.html";

    return;
  }

  // 🎯 ELEMENTOS
  const studioInput =
    document.getElementById("studio");

  const usernameInput =
    document.getElementById("username");

  const logoInput =
    document.getElementById("logoFile");

  const preview =
    document.getElementById("preview");

  const msg =
    document.getElementById("msg");

  const studioTitle =
    document.getElementById("studioTitle");

  const publicLink =
    document.getElementById("publicLink");

  const editCard =
    document.getElementById("editCard");

  let logoUrl = "";

  // 🔍 CARREGAR PERFIL
  const { data: profile } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single();

  if (profile) {

    studioInput.value =
      profile.studio_name || "";

    usernameInput.value =
      profile.username || "";

    studioTitle.innerText =
      profile.studio_name || "Meu Studio";

    // 🎨 LOGO
    if (profile.logo_url) {

      logoUrl =
        profile.logo_url;

      preview.src =
        logoUrl;
    }

    // 🔗 LINK
    const fullLink =
      `https://agenda-beleza-eta.vercel.app/agendamento.html?studio=${profile.username}`;

    publicLink.innerHTML = `
      🔗<br>
      <span class="font-bold text-pink-600 break-all">
        ${fullLink}
      </span>
    `;

    // 📋 COPIAR
    document.getElementById("copiar")
      .addEventListener("click", async () => {

      await navigator.clipboard.writeText(fullLink);

      alert("Link copiado!");

    });

    // 🌍 ABRIR
    document.getElementById("abrirAgenda")
      .addEventListener("click", () => {

      window.open(fullLink, "_blank");

    });

  }

  // ✏️ EDITAR
  document.getElementById("editar")
    .addEventListener("click", () => {

    editCard.classList.toggle("hidden");

  });

  // 👁️ PREVIEW
  logoInput.addEventListener("change", () => {

    const file =
      logoInput.files[0];

    if (!file) return;

    preview.src =
      URL.createObjectURL(file);

  });

  // 💾 SALVAR
  document.getElementById("salvar")
    .addEventListener("click", async () => {

    msg.innerText = "Salvando...";

    const file =
      logoInput.files[0];

    // 📤 UPLOAD
    if (file) {

      const fileName =
        `${user.id}-${Date.now()}`;

      const { error: uploadError } =
        await supabase.storage
          .from("logos")
          .upload(fileName, file, {
            upsert: true
          });

      if (uploadError) {

        console.log(uploadError);

        msg.innerText =
          "Erro upload logo";

        return;
      }

      const { data } =
        supabase.storage
          .from("logos")
          .getPublicUrl(fileName);

      logoUrl =
        data.publicUrl;

    }

    // 🔗 USERNAME
    const username =
      usernameInput.value
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9]/g, "");

    // 💾 SALVAR
    const { error } =
      await supabase
        .from("profiles")
        .upsert({
          id: user.id,
          studio_name: studioInput.value,
          logo_url: logoUrl,
          username: username
        });

    if (error) {

      console.log(error);

      msg.innerText =
        "Erro ao salvar";

      return;
    }

    msg.innerText =
      "Perfil atualizado!";

    setTimeout(() => {

      location.reload();

    }, 1000);

  });

  // 🚪 LOGOUT
  document.getElementById("logout")
    .addEventListener("click", async () => {

    await supabase.auth.signOut();

    window.location.href =
      "login.html";

  });

});

</script>

</body>
</html>
