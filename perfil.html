<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
const supabase = window.supabaseClient;

document.addEventListener("DOMContentLoaded", async () => {

  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const { data: profile } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single();

  if (!profile) return;

  document.getElementById("studioTitle").innerText =
    profile.studio_name || "Studio";

  document.getElementById("studio").value = profile.studio_name || "";
  document.getElementById("username").value = profile.username || "";

  document.getElementById("capacity").value = profile.capacity || 1;
  document.getElementById("slotInterval").value = profile.slot_interval || 30;

  // LINK
  const link = `${location.origin}/agendamento.html?studio=${profile.username}`;

  document.getElementById("publicLink").innerText = link;

  document.getElementById("copiar").onclick = () => {
    navigator.clipboard.writeText(link);
    alert("Link copiado!");
  };

  document.getElementById("abrirAgenda").onclick = () => {
    window.open(link);
  };

  // salvar perfil
  document.getElementById("salvar").onclick = async () => {

    await supabase.from("profiles")
      .update({
        studio_name: document.getElementById("studio").value,
        username: document.getElementById("username").value
      })
      .eq("id", user.id);

    alert("Salvo!");
    location.reload();
  };

});
</script>
