<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Studio</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gradient-to-br from-pink-100 via-pink-200 to-pink-300 min-h-screen p-4">

<div class="max-w-md mx-auto">

  <!-- CARD PRINCIPAL -->
  <div class="bg-white rounded-3xl shadow-xl p-6">

    <img id="preview"
      src="https://placehold.co/120x120/png"
      class="w-28 h-28 rounded-full mx-auto object-cover border-4 border-pink-200 shadow"
    >

    <h1 id="studioTitle"
      class="text-2xl font-bold text-center mt-4 text-gray-800">
      Meu Studio
    </h1>

    <!-- LINK -->
    <div id="publicLink"
      class="bg-pink-50 text-center p-3 rounded-2xl mt-4 text-sm">
    </div>

    <div class="grid grid-cols-2 gap-3 mt-5">

      <button id="copiar"
        class="bg-pink-500 text-white p-3 rounded-2xl font-bold">
        Copiar Link
      </button>

      <button id="abrirAgenda"
        class="bg-white border border-pink-300 text-pink-600 p-3 rounded-2xl font-bold">
        Agendamento Manual
      </button>

      <button onclick="window.location.href='painel.html'"
        class="bg-white border border-pink-300 text-pink-600 p-3 rounded-2xl font-bold">
        Painel
      </button>

      <button onclick="window.location.href='servicos.html'"
        class="bg-white border border-pink-300 text-pink-600 p-3 rounded-2xl font-bold">
        Serviços
      </button>

      <button id="editar"
        class="col-span-2 bg-gray-100 text-gray-700 p-3 rounded-2xl font-bold">
        Editar Perfil
      </button>

    </div>
  </div>

  <!-- EDIT -->
  <div id="editCard" class="bg-white rounded-3xl shadow-xl p-6 mt-5 hidden">

    <h2 class="text-xl font-bold mb-4">Editar Perfil</h2>

    <input id="studio" placeholder="Nome"
      class="w-full mb-3 p-3 border rounded-2xl">

    <input id="username" placeholder="username"
      class="w-full mb-3 p-3 border rounded-2xl">

    <input type="file" id="logoFile" class="w-full mb-4">

    <button id="salvar"
      class="w-full bg-pink-500 text-white p-3 rounded-2xl font-bold">
      Salvar
    </button>

    <p id="msg" class="text-center text-sm mt-3"></p>

  </div>

  <!-- CONFIG -->
  <div class="bg-white rounded-3xl shadow-xl p-6 mt-5">

    <h2 class="text-xl font-bold mb-5">Configuração</h2>

    <div class="grid grid-cols-2 gap-3 mb-6">

      <div>
        <label>Atendimentos simultâneos</label>
        <input type="number" id="capacity" min="1"
          class="w-full p-3 border rounded-xl">
      </div>

      <div>
        <label>Intervalo</label>
        <select id="slotInterval"
          class="w-full p-3 border rounded-xl">
          <option value="15">15 min</option>
          <option value="30">30 min</option>
          <option value="60">1h</option>
        </select>
      </div>

    </div>

    <button id="saveSettings"
      class="w-full bg-purple-500 text-white p-3 rounded-2xl font-bold">
      Salvar Config
    </button>

  </div>

</div>

<script>

const client = supabase.createClient(
  "https://bjaurtrqrasznuptthyf.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ..."
);

document.addEventListener("DOMContentLoaded", async () => {

  const { data: { user } } = await client.auth.getUser();
  if (!user) location.href = "login.html";

  let profileData = null;

  const { data: profile } = await client
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single();

  profileData = profile;

  if (profile) {

    document.getElementById("studio").value = profile.studio_name || "";
    document.getElementById("username").value = profile.username || "";

    document.getElementById("capacity").value = profile.capacity || 1;
    document.getElementById("slotInterval").value = profile.slot_interval || 30;

    document.getElementById("studioTitle").innerText =
      profile.studio_name || "Meu Studio";

    const link = `https://agenda-beleza-eta.vercel.app/agendamento.html?studio=${profile.username}`;

    document.getElementById("publicLink").innerHTML =
      `🔗<br><b class="text-pink-600 break-all">${link}</b>`;

    document.getElementById("copiar").onclick = async () => {
      await navigator.clipboard.writeText(link);
      alert("Link copiado!");
    };

    document.getElementById("abrirAgenda").onclick = () => {
      window.open(link, "_blank");
    };
  }

  // EDIT
  document.getElementById("editar").onclick = () => {
    document.getElementById("editCard").classList.toggle("hidden");
  };

  // SALVAR PERFIL
  document.getElementById("salvar").onclick = async () => {

    const studio_name = document.getElementById("studio").value;
    const username = document.getElementById("username").value;

    await client.from("profiles").update({
      studio_name,
      username
    }).eq("id", user.id);

    alert("Salvo!");
    location.reload();
  };

  // CONFIG
  document.getElementById("saveSettings").onclick = async () => {

    const capacity = Number(document.getElementById("capacity").value);
    const slot_interval = Number(document.getElementById("slotInterval").value);

    const { error } = await client
      .from("profiles")
      .update({ capacity, slot_interval })
      .eq("id", user.id);

    if (error) {
      console.log(error);
      return alert("Erro ao salvar config");
    }

    alert("Config salva!");
  };

});

</script>

</body>
</html>
