<!DOCTYPE html>
<html lang="pt-br">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Meu Studio</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="bg-gradient-to-br from-pink-100 via-pink-200 to-pink-300 min-h-screen p-4">

  <div class="max-w-md mx-auto">

    <!-- CARD PRINCIPAL -->
    <div class="bg-white rounded-3xl shadow-xl p-6">

      <img id="preview"
        src="https://placehold.co/120x120/png"
        class="w-28 h-28 rounded-full mx-auto object-cover border-4 border-pink-200 shadow"
      >

      <h1 id="studioTitle"
        class="text-2xl font-bold text-center mt-4 text-gray-800">
        Meu Studio
      </h1>

      <div id="publicLink"
        class="bg-pink-50 text-center p-3 rounded-2xl mt-4 text-sm">
      </div>

      <div class="grid grid-cols-2 gap-3 mt-5">

      <button id="copiar"
        class="text-white p-3 rounded-2xl font-bold">
          Copiar Link
        </button>

        <button id="abrirAgenda"
          class="bg-white border border-pink-300 text-pink-600 p-3 rounded-2xl font-bold hover:bg-pink-50">
          Agendamento Manual
        </button>

        <button onclick="window.location.href='painel.html'"
          class="bg-white border border-pink-300 text-pink-600 p-3 rounded-2xl font-bold hover:bg-pink-50">
          Painel
        </button>

        <button onclick="window.location.href='servicos.html'"
          class="bg-white border border-pink-300 text-pink-600 p-3 rounded-2xl font-bold hover:bg-pink-50">
          Serviços
        </button>

        <button id="editar"
          class="col-span-2 bg-gray-100 text-gray-700 p-3 rounded-2xl font-bold hover:bg-gray-200">
          Editar Perfil
        </button>

      </div>

    </div>

    <!-- EDIT -->
    <div id="editCard" class="bg-white rounded-3xl shadow-xl p-6 mt-5 hidden">

      <h2 class="text-xl font-bold mb-4">Editar Perfil ✨</h2>

      <input id="studio" placeholder="Nome do Studio"
        class="w-full mb-3 p-3 border rounded-2xl">

      <input id="username" placeholder="Seu link"
        class="w-full mb-3 p-3 border rounded-2xl">

      <input type="file" id="logoFile" class="w-full mb-4" accept="image/*">
      <label class="block text-sm font-semibold mb-2">
        Tema principal
      </label>
      
      <input
        type="color"
        id="themeColor"
        class="w-full h-14 mb-4 rounded-2xl border"
      >
      
      <label class="block text-sm font-semibold mb-2">
        Foto de fundo
      </label>
      
      <input
        type="file"
        id="backgroundFile"
        class="w-full mb-4"
        accept="image/*"
      >

      <button id="salvar"
        class="w-full text-white p-3 rounded-2xl font-bold">
        Salvar
      </button>

      <button id="logout"
        class="w-full mt-3 bg-gray-100 p-3 rounded-2xl">
        Sair
      </button>

      <p id="msg" class="text-center text-sm mt-3"></p>

    </div>

    <!-- DISPONIBILIDADE -->
    <div class="bg-white rounded-3xl shadow-xl p-6 mt-5">

      <h2 class="text-xl font-bold mb-5">
        Disponibilidade 📅
      </h2>

      <div class="grid grid-cols-2 gap-3 mb-6">

        <div>
          <label class="text-sm text-gray-500">Atendimentos simultâneos</label>
          <input type="number" id="capacity" min="1" value="1"
            class="w-full p-3 border rounded-xl">
        </div>

        <div>
          <label class="text-sm text-gray-500">Intervalo dos horários</label>
          <select id="slotInterval" class="w-full p-3 border rounded-xl">
            <option value="15">15 min</option>
            <option value="30" selected>30 min</option>
            <option value="60">1 hora</option>
          </select>
        </div>

      </div>

      <button id="saveSettings"
        class="w-full mb-6 bg-purple-500 hover:bg-purple-600 text-white p-3 rounded-2xl font-bold">
        Salvar Configurações Gerais
      </button>

      <div id="availabilityList" class="space-y-4"></div>

    </div>

  </div>

<script>

document.addEventListener("DOMContentLoaded", async () => {

  const supabase = window.supabase.createClient(
    "https://bjaurtrqrasznuptthyf.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqYXVydHJxcmFzem51cHR0aHlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MDkwNTIsImV4cCI6MjA5MzQ4NTA1Mn0.iCQyvzAJykzgLO4kZkJZ8qNbv3549rG_JuwcVEZDrKA"
  );

  const { data: { user } } = await supabase.auth.getUser();
  if (!user) return window.location.href = "login.html";

  const studioInput = document.getElementById("studio");
  const usernameInput = document.getElementById("username");
  const preview = document.getElementById("preview");
  const studioTitle = document.getElementById("studioTitle");
  const publicLink = document.getElementById("publicLink");
  const editCard = document.getElementById("editCard");
  const availabilityList = document.getElementById("availabilityList");
  const themeColorInput =
  document.getElementById("themeColor");

const backgroundFileInput =
  document.getElementById("backgroundFile");

  let profileData = null;

  // ================= PERFIL =================
  const { data: profile } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single();

  profileData = profile;

  if (profile) {

    // 🎨 APLICAR COR
const theme =
  profile.theme_color || "#ec4899";

document
  .getElementById("copiar")
  .style.background = theme;

document
  .getElementById("salvar")
  .style.background = theme;
    studioInput.value = profile.studio_name || "";
    usernameInput.value = profile.username || "";
    studioTitle.innerText = profile.studio_name || "Meu Studio";

    if (profile.logo_url) {
      preview.src = profile.logo_url;
    }

    if (profile.theme_color) {

  themeColorInput.value =
    profile.theme_color;
    }
    
    const fullLink =
      `https://agenda-beleza-eta.vercel.app/agendamento.html?studio=${profile.username}`;

    publicLink.innerHTML = `
      🔗<br>
      <span class="font-bold text-pink-600 break-all">${fullLink}</span>
    `;

    document.getElementById("copiar").onclick = async () => {
      await navigator.clipboard.writeText(fullLink);
      alert("Link copiado!");
    };

    document.getElementById("abrirAgenda").onclick = () => {
      window.open(fullLink, "_blank");
    };
  }

  // abrir/fechar edição
  document.getElementById("editar")?.addEventListener("click", () => {
    editCard.classList.toggle("hidden");
  });

  // ================= SALVAR PERFIL =================
document.getElementById("salvar").onclick = async () => {

  const studio_name = studioInput.value;
  const username = usernameInput.value;

  const logoFile =
    document.getElementById("logoFile").files[0];

  const backgroundFile =
  backgroundFileInput.files[0];

const theme_color =
  themeColorInput.value;

  const msg =
    document.getElementById("msg");

  msg.innerText = "Salvando...";

  let logo_url =
    profileData?.logo_url || null;

  let background_url =
  profileData?.background_url || null;

  // 🔥 UPLOAD FOTO
  if (logoFile) {

    const fileExt =
      logoFile.name.split(".").pop();

    const fileName =
      `${user.id}-${Date.now()}.${fileExt}`;

    const filePath =
      `logos/${fileName}`;

    const { error: uploadError } =
      await supabase.storage
        .from("logos")
        .upload(filePath, logoFile, {
          upsert: true
        });

    if (uploadError) {

      console.log(uploadError);

      msg.innerText =
        "Erro upload imagem";

      return;
    }

    const {
      data: publicUrlData
    } = supabase.storage
      .from("logos")
      .getPublicUrl(filePath);

    logo_url =
      publicUrlData.publicUrl;
  }

  // 🔥 UPLOAD BACKGROUND
if (backgroundFile) {

  const fileExt =
    backgroundFile.name
      .split(".")
      .pop();

  const fileName =
    `bg-${user.id}-${Date.now()}.${fileExt}`;

  const filePath =
    `backgrounds/${fileName}`;

  const {
    error: bgError
  } = await supabase.storage
    .from("backgrounds")
    .upload(filePath, backgroundFile, {
      upsert: true
    });

  if (bgError) {

    console.log(bgError);

    msg.innerText =
      "Erro upload fundo";

    return;
  }

  const {
    data: bgPublic
  } = supabase.storage
    .from("backgrounds")
    .getPublicUrl(filePath);

  background_url =
    bgPublic.publicUrl;
}
  
  // 🔥 UPDATE PROFILE
  const { error } =
    await supabase
      .from("profiles")
      .update({
        studio_name,
        username,
        logo_url,
        theme_color,
        background_url
      })
    
      .eq("id", user.id);

  if (error) {

    console.log(error);

    msg.innerText =
      "Erro ao salvar";

    return;
  }

  // 🔥 ATUALIZA UI
  studioTitle.innerText =
    studio_name;

  if (logo_url) {
    preview.src =
      logo_url + "?t=" + Date.now();
  }

  const fullLink =
    `https://agenda-beleza-eta.vercel.app/agendamento.html?studio=${username}`;

  publicLink.innerHTML = `
    🔗<br>
    <span class="font-bold text-pink-600 break-all">
      ${fullLink}
    </span>
  `;

  msg.innerText =
    "Salvo com sucesso!";
};
  // ================= CONFIG =================
  const { data: config } = await supabase
    .from("profiles")
    .select("capacity, slot_interval")
    .eq("id", user.id)
    .single();

  if (config) {
    document.getElementById("capacity").value = config.capacity || 1;
    document.getElementById("slotInterval").value = config.slot_interval || 30;
  }

  document.getElementById("saveSettings").onclick = async () => {

    const capacity = parseInt(document.getElementById("capacity").value);
    const slot_interval = parseInt(document.getElementById("slotInterval").value);

    await supabase
      .from("profiles")
      .update({ capacity, slot_interval })
      .eq("id", user.id);

    for (let i = 0; i < 7; i++) {

      const start = document.getElementById(`start-${i}`)?.value || "09:00";
      const end = document.getElementById(`end-${i}`)?.value || "18:00";
      const active = document.getElementById(`active-${i}`)?.checked ?? true;

      await supabase.from("availability").upsert({
        user_id: user.id,
        weekday: i,
        start_time: start,
        end_time: end,
        active
      });
    }

    alert("Configurações salvas!");
  };

  // ================= DISPONIBILIDADE =================
  const dias = ["Dom","Seg","Ter","Qua","Qui","Sex","Sab"];

  async function carregarDisponibilidade() {

    availabilityList.innerHTML = "";

    const { data: raw } = await supabase
      .from("availability")
      .select("*")
      .eq("user_id", user.id);

    const data = raw || [];

    for (let i = 0; i < 7; i++) {

      const dia = data.find(d => d.weekday === i);

      const div = document.createElement("div");
      div.className = "border p-4 rounded-2xl";

      div.innerHTML = `
        <div class="flex justify-between mb-2">
          <b>${dias[i]}</b>
          <input type="checkbox" id="active-${i}" ${dia?.active !== false ? "checked" : ""}>
        </div>

        <div class="grid grid-cols-2 gap-2">
          <input type="time" id="start-${i}" value="${dia?.start_time || "09:00"}">
          <input type="time" id="end-${i}" value="${dia?.end_time || "18:00"}">
        </div>
      `;

      availabilityList.appendChild(div);
    }
  }

  carregarDisponibilidade();

});

</script>

</body>
</html>
