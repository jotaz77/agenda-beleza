<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Studio</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body
  id="body"
  class="min-h-[100dvh] p-3 sm:p-4 overflow-x-hidden relative overflow-y-auto bg-black"
>

<!-- BACKGROUND -->
<div
  id="backgroundBlur"
  class="fixed inset-0 bg-cover bg-center scale-110 blur-xl opacity-40"
></div>

<div class="max-w-md mx-auto relative z-10">

  <!-- CARD PRINCIPAL -->
  <div class="bg-white rounded-3xl shadow-xl p-6">

    <img
      id="preview"
      src="https://placehold.co/120x120/png"
      class="w-28 h-28 rounded-full mx-auto object-cover border-4 border-pink-200 shadow"
    >

    <h1 id="studioTitle" class="text-2xl font-bold text-center mt-4 text-gray-800">
      Meu Studio
    </h1>

    <div id="publicLink" class="bg-pink-50 text-center p-3 rounded-2xl mt-4 text-sm"></div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-5">

      <button id="copiar" class="text-white p-3 rounded-2xl font-bold">
        Copiar Link
      </button>

      <button id="abrirAgenda"
        class="bg-white border border-pink-300 text-pink-600 p-3 rounded-2xl font-bold hover:bg-pink-50">
        Agendamento Manual
      </button>

      <button onclick="window.location.href='painel.html'"
        class="bg-white border border-pink-300 text-pink-600 p-3 rounded-2xl font-bold hover:bg-pink-50">
        Painel
      </button>

      <button onclick="window.location.href='servicos.html'"
        class="bg-white border border-pink-300 text-pink-600 p-3 rounded-2xl font-bold hover:bg-pink-50">
        Serviços
      </button>

      <button id="editarBtn"
        class="col-span-2 bg-gray-100 text-gray-700 p-3 rounded-2xl font-bold hover:bg-gray-200">
        Editar Perfil
      </button>

    </div>
  </div>

  <!-- EDIT -->
  <div id="editCard" class="bg-white rounded-3xl shadow-xl p-6 mt-5 hidden">

    <h2 class="text-xl font-bold mb-4">Editar Perfil ✨</h2>

    <input id="studio" placeholder="Nome do Studio" class="w-full mb-3 p-3 border rounded-2xl">
    <input id="username" placeholder="Seu link" class="w-full mb-3 p-3 border rounded-2xl">

    <label class="text-sm font-semibold">Logo:</label>
    <input type="file" id="logoFile" class="w-full mb-3" accept="image/*">

    <label class="text-sm font-semibold">Tema:</label>
    <input type="color" id="themeColor" class="w-full h-12 mb-3 border rounded-2xl">

    <label class="text-sm font-semibold">Fundo:</label>
    <input type="file" id="backgroundFile" class="w-full mb-3" accept="image/*">

    <button id="salvar" class="w-full text-white p-3 rounded-2xl font-bold">
      Salvar
    </button>

    <p id="msg" class="text-center text-sm mt-3"></p>
  </div>

  <!-- DISPONIBILIDADE -->
  <div class="bg-white rounded-3xl shadow-xl p-6 mt-5">

    <h2 class="text-xl font-bold mb-5">Disponibilidade 📅</h2>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-6">

      <input type="number" id="capacity" min="1" value="1" class="p-3 border rounded-xl">

      <select id="slotInterval" class="p-3 border rounded-xl">
        <option value="15">15 min</option>
        <option value="30">30 min</option>
        <option value="60">1 hora</option>
      </select>

    </div>

    <button id="saveSettings"
      class="w-full mb-6 bg-purple-500 text-white p-3 rounded-2xl font-bold">
      Salvar Configurações
    </button>

    <div id="availabilityList" class="space-y-4"></div>

  </div>

</div>

<script>

document.addEventListener("DOMContentLoaded", async () => {

  const supabase = window.supabase.createClient(
    "https://bjaurtrqrasznuptthyf.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqYXVydHJxcmFzem51cHR0aHlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MDkwNTIsImV4cCI6MjA5MzQ4NTA1Mn0.iCQyvzAJykzgLO4kZkJZ8qNbv3549rG_JuwcVEZDrKA"
  );

  const { data: { user } } = await supabase.auth.getUser();
  if (!user) return (window.location.href = "login.html");

  const el = (id) => document.getElementById(id);

  const studioInput = el("studio");
  const usernameInput = el("username");
  const preview = el("preview");
  const studioTitle = el("studioTitle");
  const publicLink = el("publicLink");
  const editCard = el("editCard");
  const availabilityList = el("availabilityList");
  const backgroundBlur = el("backgroundBlur");
  const themeColorInput = el("themeColor");

  let profileData = null;

  // ================= PROFILE =================
  const { data: profile } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .maybeSingle();

  if (!profile) {
    console.warn("Perfil não encontrado");
  }

  profileData = profile || {};

  // ================= UI PROFILE =================
  if (profile) {

    studioInput.value = profile.studio_name || "";
    usernameInput.value = profile.username || "";
    studioTitle.textContent = profile.studio_name || "Meu Studio";

    if (profile.logo_url) preview.src = profile.logo_url;

    const theme = profile.theme_color || "#ec4899";
    themeColorInput.value = theme;

    if (backgroundBlur) {
      backgroundBlur.style.backgroundImage = profile.background_url
        ? `url('${profile.background_url}')`
        : "none";
    }

    const usernameRaw = profile.username || "usuario";
    const safeUsername = encodeURIComponent(usernameRaw.trim());
    
    const fullLink =
      `https://agenda-beleza-eta.vercel.app/agendamento.html?studio=${safeUsername}`;

    publicLink.innerHTML = fullLink;

    el("copiar").onclick = async () => {
  try {
    await navigator.clipboard.writeText(fullLink);
    el("copiar").textContent = "Copiado!";
    setTimeout(() => (el("copiar").textContent = "Copiar Link"), 1200);
  } catch (err) {
    console.error(err);

    // fallback (funciona até em browser chato)
    const temp = document.createElement("input");
    document.body.appendChild(temp);
    temp.value = fullLink;
    temp.select();
    document.execCommand("copy");
    document.body.removeChild(temp);

    alert("Link copiado!");
  }
};
    el("abrirAgenda").onclick = () => window.open(fullLink, "_blank");

    ["copiar", "salvar", "saveSettings"].forEach(id => {
      const b = el(id);
      if (b) b.style.background = theme;
    });
  }

  // ================= EDIT TOGGLE =================
  el("editarBtn").addEventListener("click", () => {
    editCard.classList.toggle("hidden");
  });

  // ================= SAVE PROFILE =================
  el("salvar").onclick = async () => {

    const msg = el("msg");
    msg.textContent = "Salvando...";

    let logo_url = profileData?.logo_url || null;
    let background_url = profileData?.background_url || null;

    const logoFile = el("logoFile")?.files?.[0];
    const backgroundFile = el("backgroundFile")?.files?.[0];

    const studio_name = studioInput.value;
    const username = usernameInput.value;
    const theme_color = themeColorInput.value;

    try {

      if (logoFile) {
        const path = `logos/${user.id}-${Date.now()}`;
        await supabase.storage.from("logos").upload(path, logoFile, { upsert: true });
        logo_url = supabase.storage.from("logos").getPublicUrl(path).data.publicUrl;
      }

      if (backgroundFile) {
        const path = `backgrounds/${user.id}-${Date.now()}`;
        await supabase.storage.from("backgrounds").upload(path, backgroundFile, { upsert: true });
        background_url = supabase.storage.from("backgrounds").getPublicUrl(path).data.publicUrl;
      }

      await supabase.from("profiles").update({
        studio_name,
        username,
        logo_url,
        background_url,
        theme_color
      }).eq("id", user.id);

      msg.textContent = "Salvo com sucesso!";

    } catch (err) {
      console.error(err);
      msg.textContent = "Erro ao salvar";
    }
  };

  // ================= SETTINGS =================
  const { data: config } = await supabase
    .from("profiles")
    .select("capacity, slot_interval")
    .eq("id", user.id)
    .maybeSingle();

  if (config) {
    el("capacity").value = config.capacity || 1;
    el("slotInterval").value = config.slot_interval || 30;
  }

  el("saveSettings").onclick = async () => {

    await supabase.from("profiles").update({
      capacity: parseInt(el("capacity").value),
      slot_interval: parseInt(el("slotInterval").value)
    }).eq("id", user.id);

    alert("Configurações salvas!");
  };

  // ================= AVAILABILITY =================
  const dias = ["Dom","Seg","Ter","Qua","Qui","Sex","Sab"];

  async function loadAvailability() {

    availabilityList.innerHTML = "";

    const { data } = await supabase
      .from("availability")
      .select("*")
      .eq("user_id", user.id);

    for (let i = 0; i < 7; i++) {

      const d = data?.find(x => x.weekday === i);

      const div = document.createElement("div");
      div.className = "border p-3 rounded-2xl";

      div.innerHTML = `
        <b>${dias[i]}</b>
        <input type="time" id="start-${i}" value="${d?.start_time || "09:00"}">
        <input type="time" id="end-${i}" value="${d?.end_time || "18:00"}">
      `;

      availabilityList.appendChild(div);
    }
  }

  loadAvailability();

});

</script>

</body>
</html>>
