<!DOCTYPE html>
<html lang="pt-br">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Meu Studio</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="bg-gradient-to-br from-pink-100 via-pink-200 to-pink-300 min-h-screen p-4">

  <div class="max-w-md mx-auto">

    <!-- CARD -->
    <div class="bg-white rounded-3xl shadow-xl p-6">

      <img id="preview"
        src="https://placehold.co/120x120/png"
        class="w-28 h-28 rounded-full mx-auto object-cover border-4 border-pink-200 shadow">

      <h1 id="studioTitle"
        class="text-2xl font-bold text-center mt-4 text-gray-800">
        Meu Studio
      </h1>

      <div id="publicLink"
        class="bg-pink-50 text-center p-3 rounded-2xl mt-4 text-sm">
      </div>

    </div>

    <!-- DISPONIBILIDADE -->
    <div class="bg-white rounded-3xl shadow-xl p-6 mt-5">

      <h2 class="text-xl font-bold mb-5">Disponibilidade 📅</h2>

      <!-- CONFIG GERAL -->
      <div class="grid grid-cols-2 gap-3 mb-6">

        <div>
          <label class="text-sm text-gray-500">Atendimentos simultâneos</label>
          <input type="number" id="capacity" min="1" value="1"
            class="w-full p-3 border rounded-xl">
        </div>

        <div>
          <label class="text-sm text-gray-500">Intervalo</label>
          <select id="slotInterval"
            class="w-full p-3 border rounded-xl">
            <option value="15">15 min</option>
            <option value="30">30 min</option>
            <option value="60">1 hora</option>
          </select>
        </div>

      </div>

      <!-- DIAS -->
      <div id="availabilityList" class="space-y-4 mb-6"></div>

      <!-- BOTÃO ÚNICO -->
      <button id="saveAll"
        class="w-full bg-purple-500 hover:bg-purple-600 text-white p-3 rounded-2xl font-bold">
        Salvar Configurações Gerais
      </button>

    </div>

  </div>

<script>

document.addEventListener("DOMContentLoaded", async () => {

  const supabase = window.supabase.createClient(
    "https://bjaurtrqrasznuptthyf.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqYXVydHJxcmFzem51cHR0aHlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MDkwNTIsImV4cCI6MjA5MzQ4NTA1Mn0.iCQyvzAJykzgLO4kZkJZ8qNbv3549rG_JuwcVEZDrKA"
  );

  const { data: { user } } = await supabase.auth.getUser();
  if (!user) window.location.href = "login.html";

  const availabilityList = document.getElementById("availabilityList");

  const dias = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sab"];

  let availabilityState = [];

  // CARREGA PROFILE
  const { data: profile } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single();

  if (profile) {
    document.getElementById("capacity").value = profile.capacity || 1;
    document.getElementById("slotInterval").value = profile.slot_interval || 30;
  }

  // CARREGA AVAILABILITY
  async function loadAvailability() {

    const { data } = await supabase
      .from("availability")
      .select("*")
      .eq("user_id", user.id);

    availabilityState = data || [];

    availabilityList.innerHTML = "";

    for (let i = 0; i < 7; i++) {

      const dia = availabilityState.find(d => d.weekday === i);

      const div = document.createElement("div");

      div.className = "border p-4 rounded-2xl";

      div.innerHTML = `
        <div class="flex justify-between mb-2">
          <b>${dias[i]}</b>
          <input type="checkbox" id="active-${i}" ${dia?.active !== false ? "checked" : ""}>
        </div>

        <div class="grid grid-cols-2 gap-2">
          <input type="time" id="start-${i}" value="${dia?.start_time || "09:00"}">
          <input type="time" id="end-${i}" value="${dia?.end_time || "18:00"}">
        </div>
      `;

      availabilityList.appendChild(div);
    }
  }

  await loadAvailability();

  // SALVAR TUDO (BOTÃO ÚNICO)
  document.getElementById("saveAll").onclick = async () => {

    const capacity = Number(document.getElementById("capacity").value);
    const slot_interval = Number(document.getElementById("slotInterval").value);

    // 1. salva config geral
    await supabase
      .from("profiles")
      .update({ capacity, slot_interval })
      .eq("id", user.id);

    // 2. salva disponibilidade inteira
    for (let i = 0; i < 7; i++) {

      const start_time = document.getElementById(`start-${i}`).value;
      const end_time = document.getElementById(`end-${i}`).value;
      const active = document.getElementById(`active-${i}`).checked;

      await supabase.from("availability").upsert({
        user_id: user.id,
        weekday: i,
        start_time,
        end_time,
        active
      });
    }

    alert("Tudo salvo com sucesso!");
  };

});

</script>

</body>
</html>
