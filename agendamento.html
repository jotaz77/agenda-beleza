<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Agendamento</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gradient-to-br from-pink-100 to-pink-200 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white rounded-3xl shadow-xl p-6 w-full max-w-md">

    <!-- TOPO -->
    <div class="text-center mb-6">

      <img
        id="logo"
        src="https://placehold.co/100x100/png"
        class="w-24 h-24 rounded-full mx-auto object-cover border-4 border-pink-200 mb-3"
      >

      <h1
        id="studioName"
        class="text-2xl font-bold text-gray-800"
      >
        Studio
      </h1>

    </div>

    <!-- SERVIÇO -->
    <label class="font-semibold">
      Serviço
    </label>

    <select
      id="service"
      class="w-full p-3 border rounded-xl mb-4"
    >
      <option>Manicure - R$30</option>
      <option>Pedicure - R$40</option>
      <option>Alongamento - R$80</option>
    </select>

    <!-- DATA -->
    <label class="font-semibold">
      Data
    </label>

    <input
      type="date"
      id="date"
      class="w-full p-3 border rounded-xl mb-4"
    >

    <!-- HORÁRIOS -->
    <label class="font-semibold">
      Horário
    </label>

    <div
      id="times"
      class="grid grid-cols-3 gap-2 mb-4"
    ></div>

    <!-- INPUTS -->
    <input
      id="name"
      placeholder="Seu nome"
      class="w-full p-3 border rounded-xl mb-3"
    >

    <input
      id="phone"
      placeholder="WhatsApp"
      class="w-full p-3 border rounded-xl mb-4"
    >

    <!-- BOTÃO -->
    <button
      onclick="agendar()"
      class="w-full bg-pink-500 hover:bg-pink-600 transition text-white p-3 rounded-xl font-bold"
    >
      Confirmar agendamento
    </button>

  </div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  // 🔗 SUPABASE
  const supabase = window.supabase.createClient(
    "https://bjaurtrqrasznuptthyf.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqYXVydHJxcmFzem51cHR0aHlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MDkwNTIsImV4cCI6MjA5MzQ4NTA1Mn0.iCQyvzAJykzgLO4kZkJZ8qNbv3549rG_JuwcVEZDrKA"
  );

  // ⏰ HORÁRIOS
  const horariosBase = [
    "09:00", "10:00", "11:00",
    "13:00", "14:00", "15:00",
    "16:00", "17:00"
  ];

  const timesDiv =
    document.getElementById("times");

  let horarioSelecionado = null;

  let ownerId = null;

  // 🔍 PEGAR USERNAME
  const params =
    new URLSearchParams(window.location.search);

  const username =
    params.get("studio");

  if (!username) {

    alert("Studio não encontrado");

    return;
  }

  // 🔍 PEGAR PERFIL
  const {
    data: profile,
    error: profileError
  } = await supabase
    .from("profiles")
    .select("*")
    .eq("username", username)
    .single();

  if (profileError || !profile) {

    console.log(profileError);

    alert("Studio não encontrado");

    return;
  }

  // 🧠 DONA DO STUDIO
  ownerId = profile.id;

  // 🎨 SETAR PERFIL
  document.getElementById("studioName")
    .innerText =
      profile.studio_name;

  if (profile.logo_url) {

    document.getElementById("logo")
      .src =
        profile.logo_url;
  }

  // 🔍 BUSCAR HORÁRIOS OCUPADOS
  async function buscarHorariosOcupados(dataSelecionada) {

    const {
      data,
      error
    } = await supabase
      .from("appointments")
      .select("time")
      .eq("date", dataSelecionada)
      .eq("user_id", ownerId);

    if (error) {

      console.log(error);

      return [];
    }

    return data.map(item => item.time);
  }

  // 🎯 RENDER HORÁRIOS
  async function renderHorarios() {

    const date =
      document.getElementById("date").value;

    timesDiv.innerHTML = "";

    if (!date) {

      timesDiv.innerHTML =
        "<p class='text-gray-400'>Escolha uma data</p>";

      return;
    }

    const ocupados =
      await buscarHorariosOcupados(date);

    horariosBase.forEach(h => {

      const btn =
        document.createElement("button");

      btn.innerText = h;

      // 🔒 HORÁRIO OCUPADO
      if (ocupados.includes(h)) {

        btn.className =
          "bg-gray-300 p-2 rounded-xl opacity-50";

        btn.disabled = true;

      } else {

        btn.className =
          "bg-pink-100 hover:bg-pink-200 transition p-2 rounded-xl";

        btn.onclick = () => {

          horarioSelecionado = h;

          document
            .querySelectorAll("#times button")
            .forEach(b => {

              b.classList.remove(
                "bg-pink-500",
                "text-white"
              );

            });

          btn.classList.add(
            "bg-pink-500",
            "text-white"
          );

        };

      }

      timesDiv.appendChild(btn);

    });

  }

  // 📅 MUDOU DATA
  document
    .getElementById("date")
    .addEventListener("change", () => {

      horarioSelecionado = null;

      renderHorarios();

    });

  // 🚀 AGENDAR
  window.agendar = async function () {

    const name =
      document.getElementById("name").value;

    const phone =
      document.getElementById("phone").value;

    const date =
      document.getElementById("date").value;

    const service =
      document.getElementById("service").value;

    // 🚨 VALIDAÇÃO
    if (
      !name ||
      !phone ||
      !date ||
      !horarioSelecionado
    ) {

      alert("Preencha tudo!");

      return;
    }

    // 💾 SALVAR
    const { error } =
      await supabase
        .from("appointments")
        .insert([
          {
            user_id: ownerId,
            name,
            phone,
            service,
            date,
            time: horarioSelecionado,
            status: "booked"
          }
        ]);

    if (error) {

      console.log(error);

      alert("Erro ao salvar");

      return;
    }

    // 💬 WHATSAPP
    const msg =
`Novo agendamento 💅

Nome: ${name}
Serviço: ${service}
Data: ${date}
Hora: ${horarioSelecionado}`;

    const url =
      `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;

    window.open(url, "_blank");

    // ✅ SUCESSO
    alert("Agendamento realizado!");

    // 🔄 RESET
    document.getElementById("name").value = "";
    document.getElementById("phone").value = "";

    horarioSelecionado = null;

    renderHorarios();

  };

});
</script>

</body>
</html>
