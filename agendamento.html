<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agendamento</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gradient-to-br from-pink-100 to-pink-200 min-h-screen flex items-center justify-center p-4">

<div class="bg-white rounded-3xl shadow-xl p-6 w-full max-w-md">

  <div class="text-center mb-6">
    <img id="logo"
      src="https://placehold.co/100x100/png"
      class="w-24 h-24 rounded-full mx-auto object-cover border-4 border-pink-200 mb-3">

    <h1 id="studioName" class="text-2xl font-bold text-gray-800">Studio</h1>
  </div>

  <label class="font-semibold">Serviço</label>
  <select id="service" class="w-full p-3 border rounded-xl mb-4">
    <option>Carregando...</option>
  </select>

  <label class="font-semibold">Data</label>
  <input type="date" id="date" class="w-full p-3 border rounded-xl mb-4">

  <label class="font-semibold">Horários</label>
  <div id="times" class="grid grid-cols-3 gap-2 mb-4"></div>

  <input id="name" placeholder="Seu nome" class="w-full p-3 border rounded-xl mb-3">
  <input id="phone" placeholder="WhatsApp" class="w-full p-3 border rounded-xl mb-4">

  <button onclick="agendar()"
    class="w-full bg-pink-500 hover:bg-pink-600 text-white p-3 rounded-xl font-bold">
    Confirmar agendamento
  </button>

</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  const supabase = window.supabase.createClient(
    "https://bjaurtrqrasznuptthyf.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqYXVydHJxcmFzem51cHR0aHlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MDkwNTIsImV4cCI6MjA5MzQ4NTA1Mn0.iCQyvzAJykzgLO4kZkJZ8qNbv3549rG_JuwcVEZDrKA"
  );

  const params = new URLSearchParams(window.location.search);
  const username = params.get("studio");

  if (!username) {
    alert("Studio não encontrado");
    return;
  }

  let ownerId = null;
  let slots = [];
  let selectedSlot = null;
  let selectedDuration = 30;

  const timesDiv = document.getElementById("times");

  // 🔵 PERFIL
  const { data: profile } = await supabase
    .from("profiles")
    .select("*")
    .eq("username", username)
    .single();

  if (!profile) {
    alert("Studio não encontrado");
    return;
  }

  ownerId = profile.id;

  document.getElementById("studioName").innerText = profile.studio_name || "Studio";
  if (profile.logo_url) document.getElementById("logo").src = profile.logo_url;

  // 🔵 SERVIÇOS
  const { data: services } = await supabase
    .from("services")
    .select("*")
    .eq("user_id", ownerId)
    .eq("active", true);

  const serviceSelect = document.getElementById("service");
  serviceSelect.innerHTML = "";

(services || []).forEach(s => {

  const opt = document.createElement("option");

  opt.value = s.id;

  opt.innerText =
    `${s.name} - R$ ${Number(s.price).toFixed(2)}`;

  opt.dataset.duration = s.duration || 30;
  opt.dataset.name = s.name;
  opt.dataset.price = s.price;

  serviceSelect.appendChild(opt);
});

  serviceSelect.addEventListener("change", () => {

  const selected =
    serviceSelect.options[serviceSelect.selectedIndex];

  selectedDuration =
    parseInt(selected.dataset.duration || 30);

  const date =
    document.getElementById("date").value;

  if (date) render(date);
});

  // 🔵 PEGAR CONFIG (PROFILE OU GLOBAL FUTURO)
  const slotInterval = profile.slot_interval || 30;
  const openTime = profile.open_time || "09:00";
  const closeTime = profile.close_time || "18:00";

  function gerarSlots() {
    const result = [];

    let [h, m] = openTime.split(":").map(Number);
    const [hEnd, mEnd] = closeTime.split(":").map(Number);

    while (h < hEnd || (h === hEnd && m < mEnd)) {

      const time = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
      result.push(time);

      m += slotInterval;
      if (m >= 60) {
        h += Math.floor(m / 60);
        m = m % 60;
      }
    }

    return result;
  }

  // 🔵 OCUPADOS
async function getBusy(date) {

  const { data } = await supabase
    .from("appointments")
    .select("*")
    .eq("date", date)
    .eq("user_id", ownerId);

  return data || [];
}

  // 🔵 RENDER HORÁRIOS
async function render(date) {

  timesDiv.innerHTML = "";

  if (!date) return;

  const appointments = await getBusy(date);
  const capacity = profile.capacity || 1;

  slots = gerarSlots();

  slots.forEach(t => {

    const btn = document.createElement("button");
    btn.innerText = t;

    let ocupados = 0;

    appointments.forEach(app => {

      const duracao = app.duration || 30;

      const [ah, am] = app.time.split(":").map(Number);

      const inicio = ah * 60 + am;
      const fim = inicio + duracao;

      const [th, tm] = t.split(":").map(Number);

      const atual = th * 60 + tm;

      if (atual >= inicio && atual < fim) {
        ocupados++;
      }

    });

    if (ocupados >= capacity) {

      btn.className =
        "bg-gray-300 p-2 rounded-xl opacity-50";

      btn.disabled = true;

    } else {

      btn.className =
        "bg-pink-100 hover:bg-pink-200 p-2 rounded-xl";

      btn.onclick = () => {

        selectedSlot = t;

        document.querySelectorAll("#times button")
          .forEach(b =>
            b.classList.remove(
              "bg-pink-500",
              "text-white"
            )
          );

        btn.classList.add(
          "bg-pink-500",
          "text-white"
        );

      };
    }

    timesDiv.appendChild(btn);

  });

}

  document.getElementById("date").addEventListener("change", (e) => {
  selectedSlot = null;
  render(e.target.value);
});

  
  // 🔵 AGENDAR
  window.agendar = async function () {

    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const date = document.getElementById("date").value;
    const service = document.getElementById("service").value;

    if (!name || !phone || !date || !selectedSlot) {
      alert("Preencha tudo!");
      return;
    }

    const { error } = await supabase
      .from("appointments")
      .insert([{
        user_id: ownerId,
        name,
        phone,
        service,
        duration: selectedDuration,
        date,
        time: selectedSlot,
        status: "booked"
      }]);

    if (error) {
      alert("Erro ao salvar");
      return;
    }

    alert("Agendamento realizado!");

    selectedSlot = null;
    render(date);
  };

});
</script>

</body>
</html>
