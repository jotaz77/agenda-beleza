<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
const supabase = window.supabaseClient;

let ownerId;
let selectedTime = null;

document.addEventListener("DOMContentLoaded", async () => {

  const studio = new URLSearchParams(location.search).get("studio");

  const { data: profile } = await supabase
    .from("profiles")
    .select("*")
    .eq("username", studio)
    .single();

  ownerId = profile.id;

  document.getElementById("studioName").innerText =
    profile.studio_name;

  const { data: services } = await supabase
    .from("services")
    .select("*")
    .eq("user_id", ownerId)
    .eq("active", true);

  const select = document.getElementById("service");

  services.forEach(s => {
    const opt = document.createElement("option");
    opt.text = `${s.name} - R$${s.price}`;
    select.appendChild(opt);
  });

  loadTimes();
});

async function loadTimes() {

  const date = document.getElementById("date").value;
  if (!date) return;

  const { data } = await supabase
    .from("appointments")
    .select("time")
    .eq("date", date)
    .eq("owner_id", ownerId);

  const occupied = data.map(i => i.time);

  const base = ["09:00","10:00","11:00","13:00","14:00","15:00"];

  const container = document.getElementById("times");
  container.innerHTML = "";

  base.forEach(t => {

    const btn = document.createElement("button");
    btn.innerText = t;

    if (occupied.includes(t)) {
      btn.disabled = true;
      btn.className = "bg-gray-300";
    } else {
      btn.onclick = () => selectedTime = t;
    }

    container.appendChild(btn);
  });
}

window.agendar = async function () {

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const date = document.getElementById("date").value;

  if (!name || !phone || !date || !selectedTime) {
    alert("Preencha tudo");
    return;
  }

  await supabase.from("appointments").insert([{
    owner_id: ownerId,
    name,
    phone,
    date,
    time: selectedTime,
    status: "booked"
  }]);

  alert("Agendado!");
};
</script>
