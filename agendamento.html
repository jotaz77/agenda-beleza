<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agendamento PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gradient-to-br from-pink-100 to-pink-200 min-h-screen flex items-center justify-center p-4">

<div class="bg-white rounded-3xl shadow-xl p-6 w-full max-w-md">

  <div class="text-center mb-6">
    <img id="logo"
      src="https://placehold.co/100x100/png"
      class="w-24 h-24 rounded-full mx-auto object-cover border-4 border-pink-200 mb-3"
    >
    <h1 id="studioName" class="text-2xl font-bold text-gray-800">Studio</h1>
  </div>

  <label class="font-semibold">Serviço</label>
  <select id="service" class="w-full p-3 border rounded-xl mb-4"></select>

  <label class="font-semibold">Data</label>
  <input type="date" id="date" class="w-full p-3 border rounded-xl mb-4">

  <label class="font-semibold">Horário</label>
  <div id="times" class="grid grid-cols-3 gap-2 mb-4"></div>

  <input id="name" placeholder="Seu nome" class="w-full p-3 border rounded-xl mb-3">
  <input id="phone" placeholder="WhatsApp" class="w-full p-3 border rounded-xl mb-4">

  <button onclick="agendar()"
    class="w-full bg-pink-500 hover:bg-pink-600 text-white p-3 rounded-xl font-bold">
    Confirmar agendamento
  </button>

</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  const supabase = window.supabase.createClient(
    "https://bjaurtrqrasznuptthyf.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqYXVydHJxcmFzem51cHR0aHlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MDkwNTIsImV4cCI6MjA5MzQ4NTA1Mn0.iCQyvzAJykzgLO4kZkJZ8qNbv3549rG_JuwcVEZDrKA"
  );

  const timesDiv = document.getElementById("times");

  let ownerId = null;
  let selectedTime = null;

  const params = new URLSearchParams(window.location.search);
  const username = params.get("studio");

  if (!username) return alert("Studio não encontrado");

  const { data: profile } = await supabase
    .from("profiles")
    .select("*")
    .eq("username", username)
    .single();

  if (!profile) return alert("Studio não encontrado");

  ownerId = profile.id;

  document.getElementById("studioName").innerText = profile.studio_name;
  if (profile.logo_url) document.getElementById("logo").src = profile.logo_url;

  // ================= SERVIÇOS =================
  const serviceSelect = document.getElementById("service");

  const { data: services } = await supabase
    .from("services")
    .select("*")
    .eq("user_id", ownerId)
    .eq("active", true);

  serviceSelect.innerHTML = "";

  services.forEach(s => {
    const opt = document.createElement("option");
    opt.value = `${s.name} - R$ ${s.price}`;
    opt.innerText = `${s.name} - R$ ${s.price}`;
    serviceSelect.appendChild(opt);
  });

  // ================= DISPONIBILIDADE =================

  function toMinutes(t) {
    const [h, m] = t.split(":").map(Number);
    return h * 60 + m;
  }

  function toTime(min) {
    const h = String(Math.floor(min / 60)).padStart(2, "0");
    const m = String(min % 60).padStart(2, "0");
    return `${h}:${m}`;
  }

  function gerarHorarios(start, end, interval) {
    const slots = [];
    let s = toMinutes(start);
    const e = toMinutes(end);

    while (s < e) {
      slots.push(toTime(s));
      s += interval;
    }

    return slots;
  }

  async function renderHorarios() {

    const date = document.getElementById("date").value;
    if (!date) return;

    const weekday = new Date(date).getDay();

    const { data: avail } = await supabase
      .from("availability")
      .select("*")
      .eq("user_id", ownerId)
      .eq("weekday", weekday)
      .single();

    if (!avail || avail.active === false) {
      timesDiv.innerHTML = "<p class='text-red-400'>Fechado neste dia</p>";
      return;
    }

    const interval = profile.slot_interval || 30;

    const slots = gerarHorarios(
      avail.start_time,
      avail.end_time,
      interval
    );

    const { data: appointments } = await supabase
      .from("appointments")
      .select("time")
      .eq("date", date)
      .eq("user_id", ownerId);

    const countMap = {};

    appointments.forEach(a => {
      countMap[a.time] = (countMap[a.time] || 0) + 1;
    });

    const capacity = profile.capacity || 1;

    timesDiv.innerHTML = "";

    slots.forEach(time => {

      const ocupacao = countMap[time] || 0;

      const btn = document.createElement("button");
      btn.innerText = time;

      if (ocupacao >= capacity) {
        btn.className = "bg-gray-300 p-2 rounded-xl opacity-50";
        btn.disabled = true;
      } else {
        btn.className = "bg-pink-100 hover:bg-pink-200 p-2 rounded-xl";

        btn.onclick = () => {
          selectedTime = time;

          document.querySelectorAll("#times button")
            .forEach(b => b.classList.remove("bg-pink-500","text-white"));

          btn.classList.add("bg-pink-500","text-white");
        };
      }

      timesDiv.appendChild(btn);
    });
  }

  document.getElementById("date").addEventListener("change", () => {
    selectedTime = null;
    renderHorarios();
  });

  // ================= AGENDAR =================
  window.agendar = async function () {

    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const date = document.getElementById("date").value;
    const service = document.getElementById("service").value;

    if (!name || !phone || !date || !selectedTime) {
      return alert("Preencha tudo!");
    }

    const { error } = await supabase
      .from("appointments")
      .insert([{
        user_id: ownerId,
        name,
        phone,
        service,
        date,
        time: selectedTime,
        status: "booked"
      }]);

    if (error) {
      console.log(error);
      return alert("Erro ao agendar");
    }

    alert("Agendado com sucesso!");

    selectedTime = null;
    renderHorarios();
  };

});
</script>

</body>
</html>
