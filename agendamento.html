<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agendamento</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="min-h-screen flex items-center justify-center p-4 bg-[#CFCFCF]">

<div class="bg-white rounded-3xl shadow-xl p-6 w-full max-w-md">

  <div class="text-center mb-6">
    <img id="logo"
      src="https://placehold.co/100x100/png"
      class="w-24 h-24 rounded-full mx-auto object-cover border-4 border-[#696969] mb-3">

    <h1 id="studioName" class="text-2xl font-bold text-black">Studio</h1>
  </div>

  <label class="font-semibold">Serviço</label>
  <select id="service" class="w-full p-3 border rounded-xl mb-4">
    <option>Carregando...</option>
  </select>

  <div
  id="serviceDescription"
  class="
    hidden
    bg-gray-100
    rounded-2xl
    p-4
    mb-4
  "
>

  <p class="font-semibold text-sm mb-1">
    Sobre este serviço:
  </p>

  <p
    id="serviceDescriptionText"
    class="text-sm text-[#696969] whitespace-pre-wrap"
  ></p>

</div>

<!-- ADICIONAIS -->
<div
  id="addonsArea"
  class="mb-4"
  style="display:none;"
>

  <label class="font-semibold block mb-2">
    Adicionais
  </label>

  <div
    id="addonsList"
    class="space-y-2"
  ></div>

</div>

  <label class="font-semibold">Data</label>
  <input type="date" id="date" class="w-full p-3 border rounded-xl mb-4">

  <label class="font-semibold">Horários</label>
  <div id="times" class="grid grid-cols-3 gap-2 mb-4"></div>

  <input id="name" placeholder="Seu nome" class="w-full p-3 border rounded-xl mb-3">
  <input id="phone" placeholder="WhatsApp" class="w-full p-3 border rounded-xl mb-4">
  <textarea
  id="description"
  maxlength="500"
  placeholder="Descrição (opcional)"
  class="w-full p-3 border rounded-xl mb-1 resize-none h-28"
></textarea>

<p class="text-xs text-gray-500 mb-4">
  Máximo de 500 caracteres
</p>

<label class="font-semibold block mb-2">
  Enviar fotos (máx 2)
</label>

<input
  type="file"
  id="photos"
  accept="image/*"
  multiple
  class="
    w-full
    p-3
    border
    border-[#696969]
    rounded-xl
    mb-4
    bg-white
    text-sm
  "
>

  <button onclick="agendar()"
    class="w-full bg-[#CFCFCF] hover:bg-[#BEBEBE] text-white border border-[#696969] p-3 rounded-xl font-bold transition">
    Confirmar agendamento
  </button>

</div>

<script>
window.onerror = function(message, source, lineno, colno, error) {
  alert("ERRO JS: " + message);
};
  
document.addEventListener("DOMContentLoaded", async () => {

  const supabase = window.supabase.createClient(
    "https://bjaurtrqrasznuptthyf.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqYXVydHJxcmFzem51cHR0aHlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MDkwNTIsImV4cCI6MjA5MzQ4NTA1Mn0.iCQyvzAJykzgLO4kZkJZ8qNbv3549rG_JuwcVEZDrKA"
  );

  const params = new URLSearchParams(window.location.search);
  const username = params.get("studio");

  if (!username) {
    alert("Studio não encontrado");
    return;
  }

  let ownerId = null;
  let slots = [];
  let selectedSlot = null;
  let selectedDuration = 30;

  const timesDiv = document.getElementById("times");

  const addonsArea =
    document.getElementById("addonsArea");

  const addonsList =
    document.getElementById("addonsList");

  let selectedAddons = [];

  // 🔵 PERFIL
  const { data: profile } = await supabase
    .from("profiles")
    .select("*")
    .eq("username", username)
    .single();

  if (!profile) {
    alert("Studio não encontrado");
    return;
  }

  ownerId = profile.id;
  await carregarAddons();

  document.getElementById("studioName").innerText = profile.studio_name || "Studio";
  if (profile.logo_url) document.getElementById("logo").src = profile.logo_url;

// 🔵 ADICIONAIS
async function carregarAddons() {

  const { data, error } =
    await supabase
      .from("service_addons")
      .select("*")
      .eq("user_id", ownerId)
      .eq("active", true);

  if (error) {

    console.log(error);

    return;
  }

  if (!data || data.length === 0) {

    addonsArea.style.display = "block";

    return;
  }

  addonsArea.style.display = "block";

  addonsList.innerHTML = "";

  data.forEach(addon => {

    const div =
      document.createElement("label");

    div.className = `
      flex
      items-center
      gap-2
      bg-white
      border
      rounded-xl
      p-3
      cursor-pointer
    `;

    div.innerHTML = `

      <input
        type="checkbox"
        value="${addon.id}"
        data-name="${addon.name}"
        data-price="${addon.price}"
        data-duration="${addon.duration}"
      >

      <span>
        ✨ ${addon.name}
        (+R$${Number(addon.price).toFixed(2)})
      </span>

    `;

    addonsList.appendChild(div);

  });

}


  // 🔵 SERVIÇOS
const serviceSelect =
  document.getElementById("service");

serviceSelect.innerHTML = `
  <option>Carregando...</option>
`;

try {

  const response = await supabase
    .from("services")
    .select("*")
    .eq("user_id", ownerId);

  const services = response.data;

  serviceSelect.innerHTML = "";

  if (!services || services.length === 0) {

    serviceSelect.innerHTML = `
      <option>
        Nenhum serviço disponível
      </option>
    `;

  } else {

    services.forEach(s => {

      const opt =
        document.createElement("option");

      opt.value = s.id;

      opt.textContent =
        `${s.name} - R$ ${Number(s.price).toFixed(2)}`;

      opt.dataset.duration =
        s.duration || 30;

      opt.dataset.name =
        s.name;

      opt.dataset.price =
        s.price;

      opt.dataset.description =
        s.description || "";

      serviceSelect.appendChild(opt);

    });

  }

} catch(err) {

  alert("Erro ao carregar serviços");

  console.log(err);

}

serviceSelect.addEventListener("change", () => {

  const selected =
    serviceSelect.options[
      serviceSelect.selectedIndex
    ];

  selectedDuration =
    parseInt(
      selected.dataset.duration || 30
    );

  // 📋 DESCRIÇÃO
  const descriptionBox =
    document.getElementById(
      "serviceDescription"
    );

  const descriptionText =
    document.getElementById(
      "serviceDescriptionText"
    );

  const description =
    selected.dataset.description;

  if (description && description.trim() !== "") {

    descriptionBox.classList.remove("hidden");

    descriptionText.innerText =
      description;

  } else {

    descriptionBox.classList.add("hidden");

  }

  const date =
    document.getElementById("date").value;

  if (date) {
    render(date);
  }

});

const slotInterval =
  profile.slot_interval || 30;

const openTime =
  profile.open_time || "09:00";

const closeTime =
  profile.close_time || "18:00";

function gerarSlots() {

  const result = [];

  let [h, m] =
    openTime.split(":").map(Number);

  const [hEnd, mEnd] =
    closeTime.split(":").map(Number);

  while (
    h < hEnd ||
    (h === hEnd && m < mEnd)
  ) {

    const time =
      `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;

    result.push(time);

    m += slotInterval;

    if (m >= 60) {

      h += Math.floor(m / 60);

      m = m % 60;
    }
  }

  return result;
}
  // 🔵 OCUPADOS
async function getBusy(date) {

  const { data } = await supabase
    .from("appointments")
    .select("*")
    .eq("date", date)
    .eq("user_id", ownerId);

  return data || [];
}

  // 🔵 RENDER HORÁRIOS
async function render(date) {

  timesDiv.innerHTML = "";

  if (!date) return;

  const appointments = await getBusy(date);
  const capacity = profile.capacity || 1;

  slots = gerarSlots();

  slots.forEach(t => {

    const btn = document.createElement("button");
    btn.innerText = t;

    let ocupados = 0;

    appointments.forEach(app => {

      const duracao = app.duration || 30;

      const [ah, am] = app.time.split(":").map(Number);

      const inicio = ah * 60 + am;
      const fim = inicio + duracao;

      const [th, tm] = t.split(":").map(Number);

      const atual = th * 60 + tm;

      if (atual >= inicio && atual < fim) {
        ocupados++;
      }

    });

    if (ocupados >= capacity) {

      btn.className =
        "bg-gray-300 p-2 rounded-xl opacity-50";

      btn.disabled = true;

    } else {

      btn.className =
        "bg-white hover:bg-[#696969] border border-[#696969] p-2 rounded-xl transition";

      btn.onclick = () => {

        selectedSlot = t;

        document.querySelectorAll("#times button")
          .forEach(b =>
            b.classList.remove(
              "bg-[#696969]",
              "text-white"
            )
          );

        btn.classList.add(
          "bg-[#696969]",
          "text-white"
        );

      };
    }

    timesDiv.appendChild(btn);

  });

}

  document.getElementById("date").addEventListener("change", (e) => {
  selectedSlot = null;
  render(e.target.value);
});

  
  // 🔵 AGENDAR
  window.agendar = async function () {

    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const description =
      document.getElementById("description").value;

    const photoFiles =
      document.getElementById("photos").files;
    const date = document.getElementById("date").value;
    const serviceSelect =
  document.getElementById("service");

const selectedService =
  serviceSelect.options[
    serviceSelect.selectedIndex
  ];

const service =
  selectedService.dataset.name;

    let photo_urls = [];

    if (photoFiles.length > 2) {
      alert("Máximo de 2 fotos");
      return;
    }

    for (const file of photoFiles) {

      const filePath =
        `${ownerId}/${Date.now()}-${file.name}`;

      const { error: uploadError } =
        await supabase.storage
          .from("appointment-photos")
          .upload(filePath, file);

      if (uploadError) {
        console.log(uploadError);
        alert("Erro ao enviar foto");
        return;
      }

      const { data } =
        supabase.storage
          .from("appointment-photos")
          .getPublicUrl(filePath);

      photo_urls.push(data.publicUrl);
    }

    if (!name || !phone || !date || !selectedSlot) {
      alert("Preencha tudo!");
      return;
    }

    const { error } = await supabase
      .from("appointments")
      .insert([{
        user_id: ownerId,
        name,
        phone,
        service,
        duration: selectedDuration,
        date,
        time: selectedSlot,
        status: "booked",
        description,
        photo_urls
      }]);

    if (error) {
      alert("Erro ao salvar");
      return;
    }

    alert("Agendamento realizado!");

    selectedSlot = null;
    render(date);
  };

});
</script>

</body>
</html>
